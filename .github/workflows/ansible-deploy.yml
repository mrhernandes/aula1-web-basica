name: Deploy com Ansible

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    name: Executar Ansible
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v6

      - name: Instalar Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Criar inventario Ansible
        run: |
          cat > inventory.ini <<EOF
          [web]
          server ansible_host=${{ secrets.SERVER_HOST }} ansible_user=${{ secrets.SERVER_USER }} ansible_port=${{ secrets.SERVER_PORT }} ansible_ssh_private_key_file=~/.ssh/deploy_key
          EOF

      - name: Executar playbook de deploy
        run: |
          ansible-playbook -i inventory.ini ansible/deploy.yml -e "deploy_path=${{ secrets.DEPLOY_PATH }}"